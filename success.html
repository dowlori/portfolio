<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — lowdow.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#FFEDDF; --fg:#032B43; --accent:#D84727; --blue:#6D8EA0; --pale:#C6DCE7; --surface:#F5E0CC; --surface2:#EAD4BE; --muted:#4a6070; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3rem; text-align:center; }
  .icon { font-size:2rem; color:var(--accent); margin-bottom:1.5rem; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(3rem,8vw,6rem); line-height:0.9; color:var(--fg); margin-bottom:1rem; }
  h1 em { font-family:'Instrument Serif',serif; font-style:italic; color:var(--accent); }
  p { font-size:0.9rem; color:var(--muted); line-height:1.8; max-width:380px; margin-bottom:2.5rem; }
  a { display:inline-flex; align-items:center; gap:0.5rem; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--fg); text-decoration:none; border:1.5px solid var(--surface2); padding:0.9rem 1.6rem; transition:all 0.2s; }
  a:hover { background:var(--accent); border-color:var(--accent); color:var(--bg); }
</style>
</head>
<body>
  <div class="icon">✦</div>
  <h1>Message<br><em>Received</em></h1>
  <p>Thanks for reaching out. I'll get back to you within 1–2 business days.</p>
  <a href="lowdow.com">← Back to Portfolio</a>
</body>
</html>
